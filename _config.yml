# Profile information
name: Fresh
title: Tyrone Damasceno - Personal site 
description: > # this means to ignore newlines until "baseurl:"
  Personal website from Tyrone Damasceno, Software Developer, Python enthusiast
  and beer lover.
permalink: ':title/'
baseurl: "/blog" # the subpath of your site, e.g. /blog
url: "http://tyrone.pro.br" # the base hostname & protocol for your site, e.g. http://example.com

# Social
facebook: #Add your Facebook
twitter: #Add your Twitter
google-plus: #Add your Google+
github: tyronedamasceno

# Contact form
email: tyronedamasceno@gmail.com 

# Comments
discus-identifier: tyronedamasceno 

# Paginate
paginate: 5
paginate_path: /page:num/

# Build settings
markdown: kramdown
gems:
  - jekyll-feed
  - jekyll-paginate
exclude:
  - Gemfile
  - Gemfile.lock
include: [_pages]
